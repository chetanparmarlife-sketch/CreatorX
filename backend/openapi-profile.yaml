openapi: 3.0.3
info:
  title: CreatorX Profile and Referral API
  description: |
    User profile management and referral program endpoints.
    All endpoints require JWT authentication.
  version: 1.0.0
  contact:
    name: CreatorX API Support
    email: support@creatorx.com

servers:
  - url: http://localhost:8080/api/v1
    description: Local development server
  - url: https://api-staging.creatorx.com/api/v1
    description: Staging server
  - url: https://api.creatorx.com/api/v1
    description: Production server

tags:
  - name: Profile
    description: User profile management endpoints
  - name: Referrals
    description: Referral program endpoints

paths:
  /profile:
    get:
      tags:
        - Profile
      summary: Get user profile
      description: Get the authenticated user's profile information
      operationId: getProfile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profile retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'
              example:
                id: "110e8400-e29b-41d4-a716-446655440005"
                name: "Rahul Kumar"
                email: "rahul@example.com"
                username: "rahul_creator"
                avatar: "https://cdn.creatorx.com/avatars/rahul.jpg"
                bio: "Fashion content creator | 50K+ followers | High engagement"
                role: CREATOR
                isVerified: true
                kycVerified: true
                isPro: false
                categories:
                  - "Fashion"
                  - "Lifestyle"
                socialLinks:
                  - platform: "Instagram"
                    icon: "instagram"
                    url: "https://instagram.com/rahul_creator"
                    followers: "50K"
                  - platform: "YouTube"
                    icon: "youtube"
                    url: "https://youtube.com/@rahul_creator"
                    followers: "25K"
                birthDate: "1995-05-15"
                address:
                  line1: "123 Main Street"
                  line2: "Apt 4B"
                  city: "Mumbai"
                  state: "Maharashtra"
                  postalCode: "400001"
                  country: "India"
                creatorProfile:
                  username: "rahul_creator"
                  category: "Fashion"
                  followerCount: 50000
                  engagementRate: 8.5
                  instagramUrl: "https://instagram.com/rahul_creator"
                  youtubeUrl: "https://youtube.com/@rahul_creator"
                  verified: true
                createdAt: "2024-12-01T08:00:00Z"
                updatedAt: "2024-12-07T10:30:00Z"
        '401':
          description: Unauthorized - invalid or missing token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags:
        - Profile
      summary: Update user profile
      description: Update the authenticated user's profile information
      operationId: updateProfile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileUpdateRequest'
            example:
              name: "Rahul Kumar"
              bio: "Fashion content creator | 50K+ followers | High engagement"
              username: "rahul_creator"
              birthDate: "1995-05-15"
              categories:
                - "Fashion"
                - "Lifestyle"
              address:
                line1: "123 Main Street"
                line2: "Apt 4B"
                city: "Mumbai"
                state: "Maharashtra"
                postalCode: "400001"
                country: "India"
      responses:
        '200':
          description: Profile updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'
        '400':
          description: Bad request - validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                timestamp: "2024-12-07T10:30:00Z"
                status: 400
                error: "Validation Failed"
                message: "Username already taken"
                path: "/api/v1/profile"
        '401':
          description: Unauthorized - invalid or missing token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /profile/avatar:
    post:
      tags:
        - Profile
      summary: Upload profile avatar
      description: Upload or update the user's profile avatar image
      operationId: uploadAvatar
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Avatar image file (JPG, PNG, max 5MB)
            encoding:
              file:
                contentType: image/jpeg, image/png
      responses:
        '200':
          description: Avatar uploaded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  avatarUrl:
                    type: string
                    format: uri
                    example: "https://cdn.creatorx.com/avatars/110e8400-e29b-41d4-a716-446655440005/avatar.jpg"
                  message:
                    type: string
                    example: "Avatar uploaded successfully"
              example:
                avatarUrl: "https://cdn.creatorx.com/avatars/110e8400-e29b-41d4-a716-446655440005/avatar.jpg"
                message: "Avatar uploaded successfully"
        '400':
          description: Bad request - invalid file or file too large
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                timestamp: "2024-12-07T10:30:00Z"
                status: 400
                error: "Validation Failed"
                message: "File must be JPG or PNG and less than 5MB"
                path: "/api/v1/profile/avatar"
        '401':
          description: Unauthorized - invalid or missing token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /profile/portfolio:
    get:
      tags:
        - Profile
      summary: Get portfolio items
      description: Get list of portfolio items for the authenticated creator
      operationId: getPortfolio
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Portfolio items retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  portfolio:
                    type: array
                    items:
                      $ref: '#/components/schemas/PortfolioItem'
              example:
                portfolio:
                  - id: "qq0e8400-e29b-41d4-a716-446655440022"
                    title: "Summer Fashion Lookbook"
                    description: "A vibrant summer collection showcase"
                    mediaUrl: "https://cdn.creatorx.com/portfolio/summer-lookbook.jpg"
                    type: IMAGE
                    createdAt: "2024-12-01T08:00:00Z"
                  - id: "rr0e8400-e29b-41d4-a716-446655440023"
                    title: "Fashion Reel - Trending Styles"
                    description: "Quick fashion tips and trends"
                    mediaUrl: "https://cdn.creatorx.com/portfolio/fashion-reel.mp4"
                    type: VIDEO
                    createdAt: "2024-12-05T10:00:00Z"
        '401':
          description: Unauthorized - invalid or missing token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - only creators can access portfolio
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags:
        - Profile
      summary: Add portfolio item
      description: Add a new portfolio item (image or video) for the authenticated creator
      operationId: addPortfolioItem
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
                - title
              properties:
                file:
                  type: string
                  format: binary
                  description: Portfolio media file (image or video)
                title:
                  type: string
                  description: Portfolio item title
                  example: "Summer Fashion Lookbook"
                description:
                  type: string
                  nullable: true
                  description: Portfolio item description
                  example: "A vibrant summer collection showcase"
            encoding:
              file:
                contentType: image/jpeg, image/png, video/mp4, video/quicktime
      responses:
        '201':
          description: Portfolio item added successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortfolioItem'
              example:
                id: "qq0e8400-e29b-41d4-a716-446655440022"
                title: "Summer Fashion Lookbook"
                description: "A vibrant summer collection showcase"
                mediaUrl: "https://cdn.creatorx.com/portfolio/qq0e8400-e29b-41d4-a716-446655440022/summer-lookbook.jpg"
                type: IMAGE
                createdAt: "2024-12-07T10:30:00Z"
        '400':
          description: Bad request - validation error or invalid file
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - invalid or missing token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - only creators can add portfolio items
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /referrals/code:
    get:
      tags:
        - Referrals
      summary: Get referral code
      description: Get the authenticated user's referral code
      operationId: getReferralCode
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Referral code retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReferralCode'
              example:
                code: "RAHUL2024"
                createdAt: "2024-12-01T08:00:00Z"
                shareUrl: "https://creatorx.com/signup?ref=RAHUL2024"
        '401':
          description: Unauthorized - invalid or missing token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /referrals/apply:
    post:
      tags:
        - Referrals
      summary: Apply referral code
      description: |
        Apply a referral code during signup or account creation.
        The referral code must belong to another user.
      operationId: applyReferralCode
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - code
              properties:
                code:
                  type: string
                  description: Referral code to apply
                  example: "RAHUL2024"
            example:
              code: "RAHUL2024"
      responses:
        '200':
          description: Referral code applied successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Referral code applied successfully"
                  referrerName:
                    type: string
                    example: "Rahul Kumar"
                  rewardInfo:
                    type: string
                    example: "You'll both earn rewards when you complete your first campaign"
              example:
                message: "Referral code applied successfully"
                referrerName: "Rahul Kumar"
                rewardInfo: "You'll both earn rewards when you complete your first campaign"
        '400':
          description: Bad request - invalid or already applied referral code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                timestamp: "2024-12-07T10:30:00Z"
                status: 400
                error: "Bad Request"
                message: "Invalid referral code or code already applied"
                path: "/api/v1/referrals/apply"
        '401':
          description: Unauthorized - invalid or missing token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Referral code not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /referrals/stats:
    get:
      tags:
        - Referrals
      summary: Get referral statistics
      description: Get referral statistics for the authenticated user
      operationId: getReferralStats
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Referral statistics retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReferralStats'
              example:
                totalReferrals: 15
                successfulReferrals: 8
                pendingReferrals: 7
                totalEarnings: 5000.00
                referrerReward: 3000.00
                refereeReward: 2000.00
                referralCode: "RAHUL2024"
        '401':
          description: Unauthorized - invalid or missing token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from login endpoint

  schemas:
    Profile:
      type: object
      required:
        - id
        - name
        - email
        - role
        - createdAt
      properties:
        id:
          type: string
          format: uuid
          description: User unique identifier
          example: "110e8400-e29b-41d4-a716-446655440005"
        name:
          type: string
          description: User full name
          example: "Rahul Kumar"
        email:
          type: string
          format: email
          description: User email address
          example: "rahul@example.com"
        username:
          type: string
          nullable: true
          description: User username/handle
          example: "rahul_creator"
        avatar:
          type: string
          format: uri
          nullable: true
          description: Profile avatar URL
          example: "https://cdn.creatorx.com/avatars/rahul.jpg"
        bio:
          type: string
          nullable: true
          description: User bio/description
          example: "Fashion content creator | 50K+ followers | High engagement"
        role:
          $ref: '#/components/schemas/UserRole'
        isVerified:
          type: boolean
          description: Account verification status
          example: true
        kycVerified:
          type: boolean
          description: KYC verification status
          example: true
        isPro:
          type: boolean
          description: Pro account status
          example: false
        categories:
          type: array
          items:
            type: string
          description: User categories/interests
          example:
            - "Fashion"
            - "Lifestyle"
        socialLinks:
          type: array
          items:
            $ref: '#/components/schemas/SocialLink'
          description: Social media links
        birthDate:
          type: string
          format: date
          nullable: true
          description: Date of birth
          example: "1995-05-15"
        address:
          $ref: '#/components/schemas/Address'
        creatorProfile:
          type: object
          nullable: true
          properties:
            username:
              type: string
            category:
              type: string
            followerCount:
              type: integer
            engagementRate:
              type: number
              format: double
            instagramUrl:
              type: string
              format: uri
              nullable: true
            youtubeUrl:
              type: string
              format: uri
              nullable: true
            verified:
              type: boolean
          description: Creator-specific profile data (only for CREATOR role)
        brandProfile:
          type: object
          nullable: true
          properties:
            companyName:
              type: string
            industry:
              type: string
              nullable: true
            website:
              type: string
              format: uri
              nullable: true
            verified:
              type: boolean
          description: Brand-specific profile data (only for BRAND role)
        createdAt:
          type: string
          format: date-time
          description: Account creation timestamp
          example: "2024-12-01T08:00:00Z"
        updatedAt:
          type: string
          format: date-time
          description: Profile last update timestamp
          example: "2024-12-07T10:30:00Z"

    ProfileUpdateRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 255
          description: User full name
          example: "Rahul Kumar"
        bio:
          type: string
          maxLength: 500
          nullable: true
          description: User bio/description
          example: "Fashion content creator | 50K+ followers | High engagement"
        username:
          type: string
          minLength: 3
          maxLength: 50
          nullable: true
          description: User username/handle (must be unique)
          example: "rahul_creator"
        birthDate:
          type: string
          format: date
          nullable: true
          description: Date of birth
          example: "1995-05-15"
        categories:
          type: array
          items:
            type: string
          maxItems: 10
          nullable: true
          description: User categories/interests
          example:
            - "Fashion"
            - "Lifestyle"
        address:
          $ref: '#/components/schemas/Address'

    PortfolioItem:
      type: object
      required:
        - id
        - title
        - mediaUrl
        - type
        - createdAt
      properties:
        id:
          type: string
          format: uuid
          description: Portfolio item unique identifier
          example: "qq0e8400-e29b-41d4-a716-446655440022"
        title:
          type: string
          description: Portfolio item title
          example: "Summer Fashion Lookbook"
        description:
          type: string
          nullable: true
          description: Portfolio item description
          example: "A vibrant summer collection showcase"
        mediaUrl:
          type: string
          format: uri
          description: URL to portfolio media (image or video)
          example: "https://cdn.creatorx.com/portfolio/summer-lookbook.jpg"
        type:
          $ref: '#/components/schemas/PortfolioMediaType'
        createdAt:
          type: string
          format: date-time
          description: Portfolio item creation timestamp
          example: "2024-12-01T08:00:00Z"

    ReferralCode:
      type: object
      required:
        - code
        - createdAt
      properties:
        code:
          type: string
          description: Referral code
          example: "RAHUL2024"
        createdAt:
          type: string
          format: date-time
          description: Referral code creation timestamp
          example: "2024-12-01T08:00:00Z"
        shareUrl:
          type: string
          format: uri
          description: Shareable referral URL
          example: "https://creatorx.com/signup?ref=RAHUL2024"

    ReferralStats:
      type: object
      required:
        - totalReferrals
        - successfulReferrals
        - totalEarnings
      properties:
        totalReferrals:
          type: integer
          description: Total number of referrals made
          example: 15
        successfulReferrals:
          type: integer
          description: Number of successful/completed referrals
          example: 8
        pendingReferrals:
          type: integer
          description: Number of pending referrals
          example: 7
        totalEarnings:
          type: number
          format: double
          description: Total referral earnings in INR
          example: 5000.00
        referrerReward:
          type: number
          format: double
          description: Total rewards earned as referrer
          example: 3000.00
        refereeReward:
          type: number
          format: double
          description: Total rewards earned as referee
          example: 2000.00
        referralCode:
          type: string
          description: User's referral code
          example: "RAHUL2024"

    SocialLink:
      type: object
      required:
        - platform
        - url
      properties:
        platform:
          type: string
          description: Social media platform name
          example: "Instagram"
        icon:
          type: string
          nullable: true
          description: Platform icon identifier
          example: "instagram"
        url:
          type: string
          format: uri
          description: Social media profile URL
          example: "https://instagram.com/rahul_creator"
        followers:
          type: string
          nullable: true
          description: Follower count (as string, e.g., "50K")
          example: "50K"

    Address:
      type: object
      properties:
        line1:
          type: string
          nullable: true
          description: Address line 1
          example: "123 Main Street"
        line2:
          type: string
          nullable: true
          description: Address line 2
          example: "Apt 4B"
        city:
          type: string
          nullable: true
          description: City
          example: "Mumbai"
        state:
          type: string
          nullable: true
          description: State/Province
          example: "Maharashtra"
        postalCode:
          type: string
          nullable: true
          description: Postal/ZIP code
          example: "400001"
        country:
          type: string
          nullable: true
          description: Country
          example: "India"

    UserRole:
      type: string
      enum:
        - CREATOR
        - BRAND
        - ADMIN
      description: User role in the platform
      example: CREATOR

    PortfolioMediaType:
      type: string
      enum:
        - IMAGE
        - VIDEO
      description: Portfolio media type
      example: IMAGE

    ErrorResponse:
      type: object
      required:
        - timestamp
        - status
        - error
        - message
        - path
      properties:
        timestamp:
          type: string
          format: date-time
          description: Error timestamp
          example: "2024-12-07T10:30:00Z"
        status:
          type: integer
          description: HTTP status code
          example: 400
        error:
          type: string
          description: Error type
          example: "Validation Failed"
        message:
          type: string
          description: Error message
          example: "Invalid input parameters"
        path:
          type: string
          description: Request path
          example: "/api/v1/profile"
        details:
          type: object
          nullable: true
          description: Additional error details
          additionalProperties:
            type: string



