spring:
  application:
    name: creatorx-backend

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # Database Configuration (Supabase Postgres)
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/creatorx}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 300000
      max-lifetime: 900000

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  # Flyway Migration
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    baseline-on-migrate: true
    out-of-order: true
    locations: classpath:db/migration
    schemas: public

  # Redis Configuration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  # Multipart Upload Configuration
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 15MB

  # Jackson Configuration
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

# Supabase Configuration
supabase:
  url: ${SUPABASE_URL:https://your-project.supabase.co}
  jwt:
    secret: ${SUPABASE_JWT_SECRET:} # Optional fallback for HS256
  service:
    role:
      key: ${SUPABASE_SERVICE_ROLE_KEY:} # For admin operations
  storage:
    bucket:
      avatars: ${SUPABASE_STORAGE_BUCKET_AVATARS:avatars}
      kyc: ${SUPABASE_STORAGE_BUCKET_KYC:kyc-documents}
      deliverables: ${SUPABASE_STORAGE_BUCKET_DELIVERABLES:deliverables}
      portfolio: ${SUPABASE_STORAGE_BUCKET_PORTFOLIO:portfolio}
      brand-verification: ${SUPABASE_STORAGE_BUCKET_BRAND_VERIFICATION:kyc-documents}
      exports: ${SUPABASE_STORAGE_BUCKET_EXPORTS:deliverables}

# JWT Configuration (for backward compatibility, not used with Supabase)
# The JWT secret must come from the environment so a committed default cannot be used to forge tokens.
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION_MS:86400000} # 24 hours

# Razorpay Configuration (Phase 4: Real Money Payouts)
# IMPORTANT: Never expose these keys to mobile app - server-side only
razorpay:
  key-id: ${RAZORPAY_KEY_ID:}
  key-secret: ${RAZORPAY_KEY_SECRET:}
  webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:}
  webhook:
    # Optional: comma-separated list of Razorpay IP addresses to skip webhook rate limiting.
    # Leave empty to allow all IPs; rate limiting still applies to the webhook endpoint.
    # Razorpay IPs: https://razorpay.com/docs/webhooks/
    allowed-ips: ""
    rate-limit:
      requests-per-minute: 60
  payout:
    mode: ${RAZORPAY_PAYOUT_MODE:test} # test or live
    account-number: ${RAZORPAY_ACCOUNT_NUMBER:}

# Server Configuration
server:
  port: ${PORT:${SERVER_PORT:8080}}
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: on_param
    include-exception: false

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
    info:
      enabled: true
    metrics:
      enabled: true
    prometheus:
      enabled: true
  info:
    env:
      enabled: true
    java:
      enabled: true
    build:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: ${PROMETHEUS_ENABLED:true}
    tags:
      application: ${spring.application.name}

# OpenTelemetry Configuration (optional)
otel:
  enabled: ${OTEL_ENABLED:false}
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
  service:
    name: ${spring.application.name}

# CreatorX Application Configuration
creatorx:
  email:
    enabled: ${EMAIL_ENABLED:false}
    sendgrid:
      api-key: ${SENDGRID_API_KEY:}
    from:
      email: ${EMAIL_FROM_ADDRESS:noreply@creatorx.com}
      name: ${EMAIL_FROM_NAME:CreatorX}
  compliance:
    regulatory:
      cron: ${COMPLIANCE_AUDIT_CRON:0 0 2 * * ?}
    retention-cron: ${DATA_RETENTION_CRON:0 0 3 * * ?}
  social:
    token-secret: ${CREATORX_SOCIAL_TOKEN_SECRET:change-this-in-production-minimum-32-characters}
    meta:
      enabled: ${META_SOCIAL_ENABLED:true}
      app-id: ${META_APP_ID:}
      app-secret: ${META_APP_SECRET:}
    linkedin:
      enabled: ${LINKEDIN_SOCIAL_ENABLED:false}
      client-id: ${LINKEDIN_CLIENT_ID:}
      client-secret: ${LINKEDIN_CLIENT_SECRET:}
    refresh:
      auto-hours: 6
      manual-minutes: 10
      cron: ${SOCIAL_REFRESH_CRON:0 0 */6 * * ?}
  # Webhook Retry Scheduler
  webhook:
    internal-secret: ${WEBHOOK_INTERNAL_SECRET:}
    retry:
      enabled: ${WEBHOOK_RETRY_ENABLED:true}
      max-retries: ${WEBHOOK_RETRY_MAX:3}
      cron: ${WEBHOOK_RETRY_CRON:0 */15 * * * *} # Every 15 minutes
  # Campaign Completion & Auto-Refund Scheduler
  campaign:
    completion:
      enabled: ${CAMPAIGN_COMPLETION_ENABLED:true}
      cron: ${CAMPAIGN_COMPLETION_CRON:0 0 1 * * *} # 1 AM daily
  # Phase 4.2: Payout Scheduler Configuration
  payout:
    scheduler:
      enabled: ${PAYOUT_SCHEDULER_ENABLED:true}
      batch-size: ${PAYOUT_BATCH_SIZE:10}
      rate-limit-per-minute: ${PAYOUT_RATE_LIMIT:20}
      cron: ${PAYOUT_SCHEDULER_CRON:0 */5 * * * *} # Every 5 minutes
  # Phase 4.2: Reconciliation Configuration
  reconciliation:
    enabled: ${RECONCILIATION_ENABLED:true}
    cron: ${RECONCILIATION_CRON:0 0 2 * * *} # 2 AM daily
    retry-cron: ${RECONCILIATION_RETRY_CRON:0 0 6 * * *} # 6 AM daily
    alert-threshold: ${RECONCILIATION_ALERT_THRESHOLD:0.01}
  # Referral System Configuration
  referral:
    referrer-reward: ${REFERRAL_REFERRER_REWARD:100.00} # Amount credited to referrer (INR)
    referee-reward: ${REFERRAL_REFEREE_REWARD:50.00} # Amount credited to referee (INR)
  # Withdrawal Limits Configuration
  withdrawal:
    min-amount: ${WITHDRAWAL_MIN_AMOUNT:100.00} # Minimum withdrawal amount (INR)
    max-per-transaction: ${WITHDRAWAL_MAX_PER_TX:50000.00} # Max per single withdrawal (INR)
    max-per-month: ${WITHDRAWAL_MAX_PER_MONTH:200000.00} # Max total per month per creator (INR)
  # Rate Limiting Configuration
  rate-limit:
    enabled: ${RATE_LIMIT_ENABLED:true}
    general-limit: ${RATE_LIMIT_GENERAL:100} # requests per minute for general APIs
    auth-limit: ${RATE_LIMIT_AUTH:5} # requests per minute for login/register
    payment-limit: ${RATE_LIMIT_PAYMENT:10} # requests per minute for payment operations
    window-seconds: ${RATE_LIMIT_WINDOW:60} # time window in seconds
    key-prefix: "rate_limit:"

# OpenAPI Configuration
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    tags-sorter: alpha
    operations-sorter: alpha
    doc-expansion: none
    display-request-duration: true
    filter: true
    show-extensions: true
    show-common-extensions: true
  show-actuator: false
  group-configs:
    - group: "all"
      display-name: "All APIs"
      paths-to-match: "/api/v1/**"
