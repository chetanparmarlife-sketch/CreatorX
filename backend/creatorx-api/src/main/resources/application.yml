spring:
  application:
    name: creatorx-backend
  
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  
  # Database Configuration (Supabase Postgres)
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/creatorx}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
  
  # Flyway Migration
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    baseline-on-migrate: true
    locations: classpath:db/migration
    schemas: public
  
  # Redis Configuration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  
  # Jackson Configuration
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

# Supabase Configuration
supabase:
  url: ${SUPABASE_URL:https://your-project.supabase.co}
  jwt:
    secret: ${SUPABASE_JWT_SECRET:} # Optional fallback for HS256
  service:
    role:
      key: ${SUPABASE_SERVICE_ROLE_KEY:} # For admin operations
  storage:
    bucket:
      avatars: ${SUPABASE_STORAGE_BUCKET_AVATARS:avatars}
      kyc: ${SUPABASE_STORAGE_BUCKET_KYC:kyc-documents}
      deliverables: ${SUPABASE_STORAGE_BUCKET_DELIVERABLES:deliverables}
      portfolio: ${SUPABASE_STORAGE_BUCKET_PORTFOLIO:portfolio}

# JWT Configuration (for backward compatibility, not used with Supabase)
jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-change-this-in-production-minimum-32-characters}
  expiration: ${JWT_EXPIRATION_MS:86400000} # 24 hours

# Razorpay Configuration (Phase 4: Real Money Payouts)
# IMPORTANT: Never expose these keys to mobile app - server-side only
razorpay:
  key-id: ${RAZORPAY_KEY_ID:}
  key-secret: ${RAZORPAY_KEY_SECRET:}
  webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:}
  payout:
    mode: ${RAZORPAY_PAYOUT_MODE:test}  # test or live
    account-number: ${RAZORPAY_ACCOUNT_NUMBER:}

# Server Configuration
server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: on_param
    include-exception: false

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
    info:
      enabled: true
    metrics:
      enabled: true
    prometheus:
      enabled: true
  info:
    env:
      enabled: true
    java:
      enabled: true
    build:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: ${PROMETHEUS_ENABLED:true}
    tags:
      application: ${spring.application.name}
      
# OpenTelemetry Configuration (optional)
otel:
  enabled: ${OTEL_ENABLED:false}
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
  service:
    name: ${spring.application.name}
    
# CreatorX Application Configuration
creatorx:
  email:
    enabled: ${EMAIL_ENABLED:false}
    sendgrid:
      api-key: ${SENDGRID_API_KEY:}
    from:
      email: ${EMAIL_FROM_ADDRESS:noreply@creatorx.com}
      name: ${EMAIL_FROM_NAME:CreatorX}
  compliance:
    regulatory:
      cron: ${COMPLIANCE_AUDIT_CRON:0 0 2 * * ?}
    retention-cron: ${DATA_RETENTION_CRON:0 0 3 * * ?}
  social:
    token-secret: ${CREATORX_SOCIAL_TOKEN_SECRET:change-this-in-production-minimum-32-characters}
    meta:
      enabled: ${META_SOCIAL_ENABLED:true}
      app-id: ${META_APP_ID:}
      app-secret: ${META_APP_SECRET:}
    linkedin:
      enabled: ${LINKEDIN_SOCIAL_ENABLED:false}
      client-id: ${LINKEDIN_CLIENT_ID:}
      client-secret: ${LINKEDIN_CLIENT_SECRET:}
    refresh:
      auto-hours: 6
      manual-minutes: 10
      cron: ${SOCIAL_REFRESH_CRON:0 0 */6 * * ?}

# OpenAPI Configuration
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    tags-sorter: alpha
    operations-sorter: alpha
    doc-expansion: none
    display-request-duration: true
    filter: true
    show-extensions: true
    show-common-extensions: true
  show-actuator: false
  group-configs:
    - group: 'all'
      display-name: 'All APIs'
      paths-to-match: '/api/v1/**'
