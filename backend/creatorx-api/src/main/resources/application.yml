spring:
  application:
    name: creatorx-backend
  
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  
  # Database Configuration (Supabase Postgres)
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/creatorx}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
  
  # Flyway Migration
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    baseline-on-migrate: true
    locations: classpath:db/migration
    schemas: public
  
  # Redis Configuration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  
  # Jackson Configuration
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

# Supabase Configuration
supabase:
  url: ${SUPABASE_URL:https://your-project.supabase.co}
  jwt:
    secret: ${SUPABASE_JWT_SECRET:} # Optional fallback for HS256
  service:
    role:
      key: ${SUPABASE_SERVICE_ROLE_KEY:} # For admin operations
  storage:
    bucket:
      avatars: ${SUPABASE_STORAGE_BUCKET_AVATARS:avatars}
      kyc: ${SUPABASE_STORAGE_BUCKET_KYC:kyc-documents}
      deliverables: ${SUPABASE_STORAGE_BUCKET_DELIVERABLES:deliverables}
      portfolio: ${SUPABASE_STORAGE_BUCKET_PORTFOLIO:portfolio}

# JWT Configuration (for backward compatibility, not used with Supabase)
jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-change-this-in-production-minimum-32-characters}
  expiration: ${JWT_EXPIRATION_MS:86400000} # 24 hours

# Server Configuration
server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: on_param
    include-exception: false

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

# OpenAPI Configuration
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    tags-sorter: alpha
    operations-sorter: alpha
    doc-expansion: none
    display-request-duration: true
    filter: true
    show-extensions: true
    show-common-extensions: true
  show-actuator: false
  group-configs:
    - group: 'all'
      display-name: 'All APIs'
      paths-to-match: '/api/v1/**'
