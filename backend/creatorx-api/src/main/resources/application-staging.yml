# This file is loaded when the backend runs with the staging profile.
spring:
  # Connect staging to its own database, never to production.
  datasource:
    url: ${STAGING_DATABASE_URL}

  # Keep the requested Redis property for staging deploy validation.
  redis:
    url: ${STAGING_REDIS_URL}

  # Spring Boot 3 reads Redis settings from spring.data.redis, so this mirrors the same staging URL.
  data:
    redis:
      url: ${STAGING_REDIS_URL}

# Use the staging Supabase project and staging storage bucket names.
supabase:
  url: ${STAGING_SUPABASE_URL}
  # Keep the requested flat anon-key property for deployment validation.
  anon-key: ${STAGING_SUPABASE_ANON_KEY}
  # The current backend config reads supabase.anon.key, so this mirrors the same staging anon key.
  anon:
    key: ${STAGING_SUPABASE_ANON_KEY}
  jwt:
    secret: ${JWT_SECRET}
  service:
    role:
      key: ${STAGING_SUPABASE_SERVICE_ROLE_KEY:}
  storage:
    bucket:
      avatars: creatorx-staging
      kyc: creatorx-staging
      deliverables: creatorx-staging
      portfolio: creatorx-staging
      brand-verification: creatorx-staging
      exports: creatorx-staging

# JWT secret must be set as environment variable JWT_SECRET.
jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

# Use Razorpay test keys only in staging.
razorpay:
  key-id: ${STAGING_RAZORPAY_KEY_ID}
  key-secret: ${STAGING_RAZORPAY_SECRET}
  webhook-secret: ${STAGING_RAZORPAY_WEBHOOK_SECRET:}
  webhook:
    # Staging may whitelist Razorpay IPs later, but the empty default keeps rate limiting active.
    allowed-ips: ""
    rate-limit:
      requests-per-minute: 60
  payout:
    mode: test
    account-number: ${STAGING_RAZORPAY_ACCOUNT_NUMBER:}

# Keep the requested flat CORS property for deployment validation.
cors:
  allowed-origins: ${STAGING_ALLOWED_ORIGINS:*}

# The current SecurityConfig reads creatorx.cors.allowed-origins, so this mirrors the same staging origins.
creatorx:
  cors:
    allowed-origins: ${STAGING_ALLOWED_ORIGINS:*}

# Railway sends traffic to this port unless a PORT variable overrides it.
server:
  port: 8080

# Show detailed CreatorX logs in staging so bugs are easier to diagnose.
logging:
  level:
    com.creatorx: DEBUG
    root: INFO

# Expose the health endpoint so Railway and GitHub Actions can verify startup.
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
