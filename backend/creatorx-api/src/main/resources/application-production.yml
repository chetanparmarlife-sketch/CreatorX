# Production profile for Railway deployment
spring:
  jpa:
    show-sql: false
  flyway:
    enabled: true

  # Redis Configuration for Railway (usually uses Upstash with TLS)
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL_ENABLED:true}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

logging:
  level:
    com.creatorx: INFO
    root: WARN

server:
  error:
    include-stacktrace: never
    include-exception: false
