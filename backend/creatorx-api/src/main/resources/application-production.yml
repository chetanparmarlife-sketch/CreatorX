# This file is loaded when the backend runs with the production profile.
spring:
  # Mark this configuration as the production profile for real users and real payments.
  profiles:
    active: production

  # Connect production to its own database, never to staging.
  datasource:
    url: ${PROD_DATABASE_URL}

  # Connect production to its own Redis instance for cache and rate limiting.
  data:
    redis:
      url: ${PROD_REDIS_URL}

# Use the production Supabase project and production storage bucket names.
supabase:
  url: ${PROD_SUPABASE_URL}
  anon:
    key: ${PROD_SUPABASE_ANON_KEY}
  jwt:
    secret: ${PROD_JWT_SECRET}
  service:
    role:
      key: ${PROD_SUPABASE_SERVICE_ROLE_KEY:}
  storage:
    bucket:
      avatars: creatorx-production
      kyc: creatorx-production
      deliverables: creatorx-production
      portfolio: creatorx-production
      brand-verification: creatorx-production
      exports: creatorx-production

# JWT secret must be set as environment variable JWT_SECRET
# Generate one with: openssl rand -base64 64
# This avoids deploying production with a committed token-signing secret.
jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

# Use Razorpay live keys only in production.
razorpay:
  key-id: ${PROD_RAZORPAY_KEY_ID}
  key-secret: ${PROD_RAZORPAY_SECRET}
  webhook-secret: ${PROD_RAZORPAY_WEBHOOK_SECRET:}
  webhook:
    # Production may whitelist Razorpay IPs later, but the empty default keeps rate limiting active.
    allowed-ips: ""
    rate-limit:
      requests-per-minute: 60
  payout:
    mode: live
    account-number: ${PROD_RAZORPAY_ACCOUNT_NUMBER:}

# Allow only the production frontends that are listed in the environment variable.
creatorx:
  cors:
    allowed-origins: ${PROD_ALLOWED_ORIGINS}

# Restrict production WebSocket connections to explicit production frontend URLs only.
websocket:
  allowed-origins: ${PROD_ALLOWED_ORIGINS}

# Railway sends traffic to this port unless a PORT variable overrides it.
server:
  port: 8080
  error:
    include-stacktrace: never
    include-exception: false

# Keep production logs quieter so sensitive operational noise is not exposed.
logging:
  level:
    com.creatorx: INFO
    root: WARN

# Keep the public health check available and hide every other actuator endpoint.
management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health
  endpoint:
    health:
      enabled: true
      show-details: never
      probes:
        enabled: true
    info:
      enabled: false
    metrics:
      enabled: false
    prometheus:
      enabled: false
