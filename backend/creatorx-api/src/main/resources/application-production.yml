# Production profile for Railway deployment
spring:
  jpa:
    show-sql: false
    open-in-view: false
  flyway:
    # TEMPORARILY DISABLED - V41 failed in prod, blocking all deployments
    # We need to manually delete the failed entry from flyway_schema_history
    # Once cleaned up, re-enable this and V42 will run successfully
    enabled: false
    validate-on-migrate: false

  # Use simple cache instead of Redis in production (until Redis is set up)
  cache:
    type: simple

  # Disable Redis auto-configuration if not needed
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration

logging:
  level:
    com.creatorx: INFO
    root: WARN

server:
  error:
    include-stacktrace: never
    include-exception: false

# Disable health checks for services not configured
management:
  health:
    redis:
      enabled: false
    defaults:
      enabled: true
  # Set shorter startup timeout for health checks
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
