# Test configuration for PostgreSQL Testcontainers
# Flyway migrations run against real PostgreSQL
# Used by PayoutIntegrityIntegrationTest and other integration tests

spring:
  application:
    name: creatorx-backend-integration-test
  
  # Datasource is dynamically configured by Testcontainers via @DynamicPropertySource
  # These are fallback values that get overridden
  datasource:
    url: jdbc:postgresql://localhost:5432/creatorx_test
    username: test
    password: test
    driver-class-name: org.postgresql.Driver
  
  # JPA Configuration - validate against Flyway migrations
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
    open-in-view: false
  
  # Enable Flyway for real schema migrations
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  
  # Disable caching in tests
  cache:
    type: none
  
  # Disable Redis in tests
  data:
    redis:
      repositories:
        enabled: false
  
  # Exclude Redis auto-configuration in tests
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
  
  # Disable scheduled tasks during tests
  task:
    scheduling:
      enabled: false

# Disable Supabase in tests (use mocks)
supabase:
  url: http://localhost:9999
  service:
    role:
      key: test-key

# Test JWT settings
app:
  jwt:
    secret: test-jwt-secret-key-for-integration-tests-must-be-at-least-256-bits-long
    expiration: 86400000
  social:
    token:
      secret: test-social-token-secret-key-for-integration-tests-must-be-long

# Payout window settings - always open for testing
platform:
  settings:
    payout:
      window:
        enabled: false
