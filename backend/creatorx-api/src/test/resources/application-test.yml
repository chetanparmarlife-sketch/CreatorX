spring:
  application:
    name: creatorx-backend-test
  
  # Test Database Configuration (TestContainers)
  datasource:
    url: ${TEST_DATABASE_URL:jdbc:postgresql://localhost:5432/creatorx_test}
    username: ${TEST_DATABASE_USERNAME:test}
    password: ${TEST_DATABASE_PASSWORD:test}
    driver-class-name: org.postgresql.Driver
  
  # JPA Configuration for Tests
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
  
  # Disable Flyway in tests (use create-drop)
  flyway:
    enabled: false
  
  # Disable Redis in tests
  data:
    redis:
      repositories:
        enabled: false
  
  # Disable scheduled tasks during tests
  task:
    scheduling:
      enabled: false

# Disable Supabase in tests (use mocks)
supabase:
  url: http://localhost:9999
  service:
    role:
      key: test-key

# JWT Configuration for tests
jwt:
  secret: ${JWT_SECRET:test-jwt-secret-key-minimum-32-characters-for-tests}

# Social account and compliance configuration for tests
creatorx:
  social:
    token-secret: ${CREATORX_SOCIAL_TOKEN_SECRET:test-social-token-encryption-secret-key-minimum-32-chars}
    meta:
      enabled: false
    linkedin:
      enabled: false
    refresh:
      auto-hours: 6
      manual-minutes: 10
      cron: "-" # Disable cron during tests
  compliance:
    regulatory:
      cron: "-" # Disable cron during tests
    retention-cron: "-" # Disable cron during tests

# Logging
logging:
  level:
    root: INFO
    com.creatorx: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG

# Server
server:
  port: 0 # Random port for tests

