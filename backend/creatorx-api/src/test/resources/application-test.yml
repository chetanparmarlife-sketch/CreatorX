spring:
  application:
    name: creatorx-backend-test
  
  # Test Database Configuration (TestContainers)
  datasource:
    url: ${TEST_DATABASE_URL:jdbc:postgresql://localhost:5432/creatorx_test}
    username: ${TEST_DATABASE_USERNAME:test}
    password: ${TEST_DATABASE_PASSWORD:test}
    driver-class-name: org.postgresql.Driver
  
  # JPA Configuration for Tests
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
  
  # Disable Flyway in tests (use create-drop)
  flyway:
    enabled: false
  
  # Disable Redis in tests
  data:
    redis:
      repositories:
        enabled: false

# Disable Supabase in tests (use mocks)
supabase:
  url: http://localhost:9999
  service:
    role:
      key: test-key

# Logging
logging:
  level:
    root: INFO
    com.creatorx: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG

# Server
server:
  port: 0 # Random port for tests

