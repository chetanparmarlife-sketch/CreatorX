spring:
  application:
    name: creatorx-backend-test
  
  # H2 In-Memory Database Configuration with PostgreSQL compatibility
  datasource:
    url: jdbc:h2:mem:creatorx_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;INIT=CREATE DOMAIN IF NOT EXISTS TEXT AS VARCHAR(10485760)\;CREATE DOMAIN IF NOT EXISTS JSONB AS VARCHAR(10485760)\;CREATE DOMAIN IF NOT EXISTS INET AS VARCHAR(255)
    username: test
    password: test
    driver-class-name: org.h2.Driver
  
  # JPA Configuration for Tests with H2
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false
    open-in-view: false
  
  # Disable Flyway in tests (use create-drop via Hibernate DDL)
  flyway:
    enabled: false
  
  # Disable caching in tests
  cache:
    type: none
  
  # Disable Redis in tests
  data:
    redis:
      repositories:
        enabled: false
  
  # Disable web server for unit tests
  main:
    web-application-type: servlet
  
  # Disable scheduled tasks during tests
  task:
    scheduling:
      enabled: false

# Disable Supabase in tests (use mocks)
supabase:
  url: http://localhost:9999
  service:
    role:
      key: test-key

# JWT Configuration for tests
jwt:
  secret: ${JWT_SECRET:test-jwt-secret-key-minimum-32-characters-for-tests}

# Social account and compliance configuration for tests
creatorx:
  social:
    token-secret: ${CREATORX_SOCIAL_TOKEN_SECRET:test-social-token-encryption-secret-key-minimum-32-chars}
    meta:
      enabled: false
    linkedin:
      enabled: false
    refresh:
      auto-hours: 6
      manual-minutes: 10
      cron: "-" # Disable cron during tests
  compliance:
    regulatory:
      cron: "-" # Disable cron during tests
    retention-cron: "-" # Disable cron during tests

# Logging
logging:
  level:
    root: INFO
    com.creatorx: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG

# Server
server:
  port: 0 # Random port for tests
