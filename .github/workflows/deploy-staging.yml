name: Deploy Staging

on:
  # Run this workflow every time code is pushed to the staging branch.
  push:
    branches:
      - develop

permissions:
  # Allow this workflow to read the repository contents.
  contents: read

jobs:
  deploy-backend:
    name: Deploy backend to Railway staging
    runs-on: ubuntu-latest

    steps:
      # Download the repository code into the GitHub runner.
      - name: Checkout code
        uses: actions/checkout@v4

      # Stop immediately with a clear error if the Railway staging token was not added in GitHub Secrets.
      - name: Check required Railway staging secret
        env:
          STAGING_RAILWAY_TOKEN: ${{ secrets.STAGING_RAILWAY_TOKEN }}
        run: |
          if [ -z "$STAGING_RAILWAY_TOKEN" ]; then
            echo "Missing required GitHub Secret: STAGING_RAILWAY_TOKEN"
            exit 1
          fi

      # Install Java 17 because the Spring Boot backend is built with Java 17.
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: gradle

      # Make the Gradle launcher executable on Linux.
      - name: Make Gradle executable
        working-directory: backend
        run: chmod +x ./gradlew

      # Build the backend package without running tests because tests run in the separate CI workflow.
      - name: Build backend
        working-directory: backend
        run: ./gradlew build -x test --no-daemon

      # Install the Railway command line tool so GitHub Actions can deploy to Railway.
      - name: Install Railway CLI
        run: npm install -g @railway/cli

      # Use the staging Railway config for this deploy run.
      - name: Select Railway staging config
        run: cp railway.staging.json railway.json

      # Upload the backend code to the Railway staging service.
      - name: Deploy backend to Railway staging
        env:
          RAILWAY_TOKEN: ${{ secrets.STAGING_RAILWAY_TOKEN }}
        run: railway up --service creatorx-backend-staging --environment staging --ci

  deploy-brand-dashboard:
    name: Deploy brand dashboard to Vercel staging
    runs-on: ubuntu-latest

    steps:
      # Download the repository code into the GitHub runner.
      - name: Checkout code
        uses: actions/checkout@v4

      # Stop immediately with a clear error if any Vercel secret needed for the brand project is missing.
      - name: Check required Vercel brand staging secrets
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_BRAND_PROJECT_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "Missing required GitHub Secret: VERCEL_TOKEN"
            exit 1
          fi
          if [ -z "$VERCEL_ORG_ID" ]; then
            echo "Missing required GitHub Secret: VERCEL_ORG_ID"
            exit 1
          fi
          if [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "Missing required GitHub Secret: VERCEL_BRAND_PROJECT_ID"
            exit 1
          fi

      # Install Node.js 18 because the Next.js dashboards are built with Node.
      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: brand-dashboard/package-lock.json

      # Install the exact package versions listed in package-lock.json.
      - name: Install brand dashboard dependencies
        working-directory: brand-dashboard
        run: npm ci

      # Run the normal Next.js build so the workflow fails before deployment if the app cannot compile.
      - name: Build brand dashboard
        working-directory: brand-dashboard
        run: npm run build

      # Install the Vercel command line tool so GitHub Actions can deploy to Vercel.
      - name: Install Vercel CLI
        run: npm install -g vercel

      # Pull the staging environment settings from Vercel for the brand dashboard project.
      - name: Pull Vercel staging settings for brand dashboard
        working-directory: brand-dashboard
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_BRAND_PROJECT_ID }}
        run: vercel pull --yes --environment=staging --token="$VERCEL_TOKEN"

      # Create the Vercel prebuilt output that the next deploy step uploads.
      - name: Create Vercel prebuilt output for brand dashboard
        working-directory: brand-dashboard
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_BRAND_PROJECT_ID }}
        run: vercel build --target=staging --token="$VERCEL_TOKEN"

      # Deploy the already-built brand dashboard to the Vercel staging target.
      - name: Deploy brand dashboard to Vercel staging
        working-directory: brand-dashboard
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_BRAND_PROJECT_ID }}
        run: vercel deploy --prebuilt --target=staging --token="$VERCEL_TOKEN"

  deploy-admin-dashboard:
    name: Deploy admin dashboard to Vercel staging (creatorx-admin-staging)
    runs-on: ubuntu-latest

    steps:
      # Download the repository code into the GitHub runner.
      - name: Checkout code
        uses: actions/checkout@v4

      # Stop immediately with a clear error if any Vercel secret needed for the admin project is missing.
      - name: Check required Vercel admin staging secrets
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_ADMIN_PROJECT_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "Missing required GitHub Secret: VERCEL_TOKEN"
            exit 1
          fi
          if [ -z "$VERCEL_ORG_ID" ]; then
            echo "Missing required GitHub Secret: VERCEL_ORG_ID"
            exit 1
          fi
          if [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "Missing required GitHub Secret: VERCEL_ADMIN_PROJECT_ID"
            exit 1
          fi

      # Install Node.js 18 because the Next.js dashboards are built with Node.
      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: admin-dashboard/package-lock.json

      # Install the exact package versions listed in package-lock.json.
      - name: Install admin dashboard dependencies
        working-directory: admin-dashboard
        run: npm ci

      # Run the normal Next.js build so the workflow fails before deployment if the app cannot compile.
      - name: Build admin dashboard
        working-directory: admin-dashboard
        run: npm run build

      # Install the Vercel command line tool so GitHub Actions can deploy to Vercel.
      - name: Install Vercel CLI
        run: npm install -g vercel

      # Pull the staging environment settings from Vercel for the admin dashboard project.
      - name: Pull Vercel staging settings for admin dashboard
        working-directory: admin-dashboard
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_ADMIN_PROJECT_ID }}
        run: vercel pull --yes --environment=staging --token="$VERCEL_TOKEN"

      # Create the Vercel prebuilt output that the next deploy step uploads.
      - name: Create Vercel prebuilt output for admin dashboard
        working-directory: admin-dashboard
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_ADMIN_PROJECT_ID }}
        run: vercel build --target=staging --token="$VERCEL_TOKEN"

      # Deploy the already-built admin dashboard to the Vercel staging target.
      - name: Deploy admin dashboard to Vercel staging
        working-directory: admin-dashboard
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_ADMIN_PROJECT_ID }}
        run: vercel deploy --prebuilt --target=staging --token="$VERCEL_TOKEN"

  notify:
    name: Optional staging notification
    runs-on: ubuntu-latest
    needs:
      - deploy-backend
      - deploy-brand-dashboard
      - deploy-admin-dashboard
    if: always()

    steps:
      # This is a ready-to-use notification shape. Remove the comment marks after adding a webhook secret.
      - name: Slack or Discord notification template
        run: |
          echo "Optional notification is currently disabled."
