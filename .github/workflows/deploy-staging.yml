name: Deploy Staging

on:
  # Run this workflow every time code is pushed to the staging branch.
  push:
    branches:
      - develop

permissions:
  # Allow this workflow to read repository files during the deploy jobs.
  contents: read

jobs:
  deploy-backend:
    name: Deploy backend to Railway staging
    runs-on: ubuntu-latest

    steps:
      # Download the repository code into the GitHub runner.
      - name: Checkout code
        uses: actions/checkout@v4

      # Stop immediately with a clear error if the Railway staging token was not added in GitHub Secrets.
      - name: Check required Railway staging secret
        env:
          STAGING_RAILWAY_TOKEN: ${{ secrets.STAGING_RAILWAY_TOKEN }}
        run: |
          if [ -z "$STAGING_RAILWAY_TOKEN" ]; then
            echo "Missing required GitHub Secret: STAGING_RAILWAY_TOKEN"
            exit 1
          fi

      # Install Java 17 because the Spring Boot backend is built with Java 17.
      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # Cache Gradle packages so repeated staging builds download far fewer dependencies.
      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      # Make the Gradle launcher executable on Linux before building.
      - name: Make Gradle executable
        run: chmod +x backend/gradlew

      # Build the backend package from the backend folder so the Railway artifact exists before deploy.
      - name: Build backend
        run: cd backend && ./gradlew build -x test

      # Install the Railway command line tool so GitHub Actions can deploy to Railway.
      - name: Install Railway CLI
        run: npm install -g @railway/cli

      # Use the staging Railway config for this deploy run.
      - name: Select Railway staging config
        run: cp railway.staging.json railway.json

      # Upload the backend code to the Railway staging service using Railway CLI v3 syntax.
      - name: Deploy backend to Railway staging
        run: railway up --service creatorx-backend-staging --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.STAGING_RAILWAY_TOKEN }}

  deploy-brand-dashboard:
    name: Deploy brand dashboard to Vercel staging
    runs-on: ubuntu-latest

    steps:
      # Download the repository code into the GitHub runner.
      - name: Checkout code
        uses: actions/checkout@v4

      # Stop immediately with a clear error if any Vercel secret needed for the brand project is missing.
      - name: Check required Vercel brand staging secrets
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_BRAND_PROJECT_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "Missing required GitHub Secret: VERCEL_TOKEN"
            exit 1
          fi
          if [ -z "$VERCEL_ORG_ID" ]; then
            echo "Missing required GitHub Secret: VERCEL_ORG_ID"
            exit 1
          fi
          if [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "Missing required GitHub Secret: VERCEL_BRAND_PROJECT_ID"
            exit 1
          fi

      # Install Node.js 18 because the Next.js dashboards are built with Node.
      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # Install the Vercel command line tool so GitHub Actions can deploy to Vercel.
      - name: Install Vercel CLI
        run: npm install -g vercel

      # Pull preview settings, build, and deploy the brand dashboard as a Vercel prebuilt preview.
      - name: Deploy brand dashboard to Vercel staging
        run: |
          cd brand-dashboard
          npm ci
          vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_BRAND_PROJECT_ID }}

  deploy-admin-dashboard:
    name: Deploy admin dashboard to Vercel staging
    runs-on: ubuntu-latest

    steps:
      # Download the repository code into the GitHub runner.
      - name: Checkout code
        uses: actions/checkout@v4

      # Stop immediately with a clear error if any Vercel secret needed for the admin project is missing.
      - name: Check required Vercel admin staging secrets
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_ADMIN_PROJECT_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "Missing required GitHub Secret: VERCEL_TOKEN"
            exit 1
          fi
          if [ -z "$VERCEL_ORG_ID" ]; then
            echo "Missing required GitHub Secret: VERCEL_ORG_ID"
            exit 1
          fi
          if [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "Missing required GitHub Secret: VERCEL_ADMIN_PROJECT_ID"
            exit 1
          fi

      # Install Node.js 18 because the Next.js dashboards are built with Node.
      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # Install the Vercel command line tool so GitHub Actions can deploy to Vercel.
      - name: Install Vercel CLI
        run: npm install -g vercel

      # Pull preview settings, build, and deploy the admin dashboard as a Vercel prebuilt preview.
      - name: Deploy admin dashboard to Vercel staging
        run: |
          cd admin-dashboard
          npm ci
          vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_ADMIN_PROJECT_ID }}

  notify:
    name: Optional staging notification
    runs-on: ubuntu-latest
    needs:
      - deploy-backend
      - deploy-brand-dashboard
      - deploy-admin-dashboard
    if: always()

    steps:
      # Leave a visible workflow note; webhook notifications can be enabled after adding a Slack or Discord secret.
      - name: Slack or Discord notification template
        run: |
          echo "Optional notification is currently disabled."
          # curl -X POST -H "Content-Type: application/json" \
          #   -d '{"text":"CreatorX staging deployment finished. Check GitHub Actions for details."}' \
          #   "${{ secrets.SLACK_WEBHOOK_URL }}"
          # curl -X POST -H "Content-Type: application/json" \
          #   -d '{"content":"CreatorX staging deployment finished. Check GitHub Actions for details."}' \
          #   "${{ secrets.DISCORD_WEBHOOK_URL }}"
