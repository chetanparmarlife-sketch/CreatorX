name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        type: choice
        options:
          - dev
          - staging
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/creatorx-backend
  JAVA_VERSION: '17'

jobs:
  # ============================================
  # Build & Test (uses Testcontainers, no external services)
  # ============================================
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'
      
      - name: Grant execute permission for gradlew
        working-directory: ./backend
        run: chmod +x gradlew
      
      - name: Validate Gradle wrapper
        uses: gradle/wrapper-validation-action@v2
      
      - name: Build project
        working-directory: ./backend
        run: ./gradlew build -x test --no-daemon
      
      - name: Run creatorx-service tests
        working-directory: ./backend
        run: ./gradlew :creatorx-service:test --no-daemon --stacktrace
        env:
          SPRING_PROFILES_ACTIVE: test
      
      - name: Run creatorx-api tests (includes integration tests)
        working-directory: ./backend
        run: ./gradlew :creatorx-api:test --no-daemon --stacktrace
        env:
          SPRING_PROFILES_ACTIVE: test
          TESTCONTAINERS_RYUK_DISABLED: false
      
      - name: Generate JaCoCo report
        working-directory: ./backend
        if: always()
        run: ./gradlew jacocoRootReport --no-daemon || echo "JaCoCo skipped"
      
      - name: Check coverage threshold
        working-directory: ./backend
        if: success()
        run: ./gradlew jacocoTestCoverageVerification --no-daemon || echo "Coverage check - review required"
      
      - name: Upload JUnit test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-test-results
          path: backend/**/build/test-results/**/*.xml
          if-no-files-found: warn
          retention-days: 30
      
      - name: Upload test reports (HTML)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports-html
          path: backend/**/build/reports/tests/**/*
          if-no-files-found: warn
          retention-days: 14
      
      - name: Upload JaCoCo coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-coverage-reports
          path: |
            backend/**/build/reports/jacoco/**/*
            backend/build/reports/jacoco/**/*
          if-no-files-found: warn
          retention-days: 30
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: build-artifacts
          path: backend/creatorx-api/build/libs/*.jar
          retention-days: 7

  # ============================================
  # Code Quality (PR only)
  # ============================================
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'
      
      - name: Run Checkstyle
        working-directory: ./backend
        run: |
          chmod +x gradlew
          ./gradlew checkstyleMain --no-daemon || true
      
      - name: Upload Checkstyle results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: checkstyle-results
          path: backend/**/build/reports/checkstyle/**
          if-no-files-found: ignore

  # ============================================
  # Build Docker Image
  # ============================================
  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [build-and-test]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
      
      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_VERSION=${{ github.sha }}

  # ============================================
  # Deploy to Dev (gated by DEPLOY_ENABLED)
  # ============================================
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: [build-docker]
    if: |
      github.ref == 'refs/heads/main' && 
      github.event_name == 'push' &&
      vars.DEPLOY_ENABLED == 'true'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      
      - name: Deploy to Cloud Run
        run: |
          chmod +x ./scripts/deploy-dev.sh
          ./scripts/deploy-dev.sh ${{ needs.build-docker.outputs.image-tag }}
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          SERVICE_NAME: creatorx-backend-dev
          REGION: us-central1
      
      - name: Run smoke tests
        run: |
          chmod +x ./scripts/smoke-tests.sh
          ./scripts/smoke-tests.sh https://api-dev.creatorx.com

  # ============================================
  # Deploy to Staging (gated by DEPLOY_ENABLED)
  # ============================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-docker]
    if: |
      startsWith(github.ref, 'refs/tags/v') &&
      vars.DEPLOY_ENABLED == 'true'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      
      - name: Deploy to Cloud Run
        run: |
          chmod +x ./scripts/deploy-staging.sh
          ./scripts/deploy-staging.sh ${{ needs.build-docker.outputs.image-tag }} ${{ github.ref_name }}
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          SERVICE_NAME: creatorx-backend-staging
          REGION: us-central1
      
      - name: Run E2E tests
        run: |
          chmod +x ./scripts/e2e-tests.sh
          ./scripts/e2e-tests.sh https://api-staging.creatorx.com

  # ============================================
  # Deploy to Production (gated by DEPLOY_ENABLED, manual)
  # ============================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: |
      github.event_name == 'workflow_dispatch' && 
      github.event.inputs.environment == 'production' &&
      vars.DEPLOY_ENABLED == 'true'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      
      - name: Deploy to Cloud Run
        id: deploy
        run: |
          chmod +x ./scripts/deploy-production.sh
          ./scripts/deploy-production.sh ${{ needs.build-docker.outputs.image-tag }}
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          SERVICE_NAME: creatorx-backend-prod
          REGION: us-central1
      
      - name: Health check
        run: |
          chmod +x ./scripts/health-check.sh
          ./scripts/health-check.sh https://api.creatorx.com
      
      - name: Rollback on failure
        if: failure()
        run: |
          chmod +x ./scripts/rollback.sh
          ./scripts/rollback.sh production
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
