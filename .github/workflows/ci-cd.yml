name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        type: choice
        options:
          - dev
          - staging
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/creatorx-backend
  JAVA_VERSION: '17'
  GRADLE_OPTS: '-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true'

jobs:
  # ============================================
  # Build & Test (uses Testcontainers, no external services)
  # ============================================
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'
      
      - name: Grant execute permission for gradlew
        working-directory: ./backend
        run: chmod +x gradlew
      
      - name: Validate Gradle wrapper
        uses: gradle/wrapper-validation-action@v2
      
      # Cache Gradle dependencies
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('backend/**/*.gradle*', 'backend/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      
      # Build without tests first (faster feedback)
      - name: Build project
        working-directory: ./backend
        run: ./gradlew clean build -x test --no-daemon --stacktrace
      
      # Run unit tests (H2, fast)
      - name: Run unit tests
        working-directory: ./backend
        run: ./gradlew test --no-daemon --stacktrace --continue
        env:
          SPRING_PROFILES_ACTIVE: test
      
      # Run integration tests separately (Testcontainers)
      - name: Run integration tests
        working-directory: ./backend
        run: ./gradlew :creatorx-api:integrationTest --no-daemon --stacktrace || echo "Integration tests completed with warnings"
        env:
          SPRING_PROFILES_ACTIVE: test
          TESTCONTAINERS_RYUK_DISABLED: false
      
      # Generate coverage report
      - name: Generate JaCoCo report
        working-directory: ./backend
        if: always()
        run: ./gradlew jacocoRootReport --no-daemon || echo "JaCoCo report generation skipped"
      
      # Coverage check (non-blocking for now)
      - name: Check coverage threshold
        working-directory: ./backend
        if: success()
        continue-on-error: true
        run: ./gradlew jacocoTestCoverageVerification --no-daemon
      
      # Upload test results
      - name: Upload JUnit test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-test-results
          path: backend/**/build/test-results/**/*.xml
          if-no-files-found: warn
          retention-days: 30
      
      # Upload test reports (HTML)
      - name: Upload test reports (HTML)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports-html
          path: backend/**/build/reports/tests/**/*
          if-no-files-found: warn
          retention-days: 14
      
      # Upload JaCoCo coverage reports
      - name: Upload JaCoCo coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-coverage-reports
          path: |
            backend/**/build/reports/jacoco/**/*
            backend/build/reports/jacoco/**/*
          if-no-files-found: warn
          retention-days: 30
      
      # Upload build artifacts (JAR)
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: build-artifacts
          path: backend/creatorx-api/build/libs/*.jar
          retention-days: 7
      
      # Publish test results as PR comment
      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always() && github.event_name == 'pull_request'
        with:
          files: backend/**/build/test-results/**/*.xml
          comment_mode: failures

  # ============================================
  # Code Quality (PR only)
  # ============================================
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'
      
      - name: Run Checkstyle
        working-directory: ./backend
        continue-on-error: true
        run: |
          chmod +x gradlew
          ./gradlew checkstyleMain --no-daemon || echo "Checkstyle completed with warnings"
      
      - name: Upload Checkstyle results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: checkstyle-results
          path: backend/**/build/reports/checkstyle/**
          if-no-files-found: ignore

  # ============================================
  # Build Docker Image
  # ============================================
  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [build-and-test]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    
    permissions:
      contents: read
      packages: write
    
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
      
      # Use regular Dockerfile if Dockerfile.prod doesn't exist
      - name: Check Dockerfile
        id: check-dockerfile
        working-directory: ./backend
        run: |
          if [ -f "Dockerfile.prod" ]; then
            echo "dockerfile=Dockerfile.prod" >> $GITHUB_OUTPUT
          else
            echo "dockerfile=Dockerfile" >> $GITHUB_OUTPUT
          fi
      
      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/${{ steps.check-dockerfile.outputs.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_VERSION=${{ github.sha }}

  # ============================================
  # Deploy to Railway (Staging)
  # ============================================
  deploy-railway:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: [build-and-test]
    if: |
      github.ref == 'refs/heads/main' && 
      github.event_name == 'push'
    environment: staging
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      
      - name: Deploy to Railway
        run: railway up --service backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        continue-on-error: true
      
      - name: Health check
        if: success()
        run: |
          sleep 30
          curl -f ${{ vars.RAILWAY_API_URL }}/api/v1/health || echo "Health check pending"
        continue-on-error: true

  # ============================================
  # Notify on Failure
  # ============================================
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [build-and-test, build-docker]
    if: failure()
    
    steps:
      - name: Send failure notification
        run: |
          echo "Build failed for ${{ github.repository }} on branch ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"
          echo "Actor: ${{ github.actor }}"
