name: Backend Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'backend/**'

permissions:
  checks: write
  pull-requests: write
  contents: read

jobs:
  test:
    name: Backend Tests (Testcontainers)
    runs-on: ubuntu-latest
    
    # No external services needed - Testcontainers handles PostgreSQL/Redis
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew
        working-directory: backend
      
      - name: Validate Gradle wrapper
        uses: gradle/wrapper-validation-action@v2
      
      - name: Compile code
        working-directory: backend
        run: ./gradlew compileJava compileTestJava --no-daemon --stacktrace
      
      - name: Run creatorx-service tests
        working-directory: backend
        run: ./gradlew :creatorx-service:test --no-daemon --stacktrace
        env:
          SPRING_PROFILES_ACTIVE: test
      
      - name: Run creatorx-api tests (includes integration tests)
        working-directory: backend
        run: ./gradlew :creatorx-api:test --no-daemon --stacktrace
        env:
          SPRING_PROFILES_ACTIVE: test
          # Testcontainers uses Docker automatically available on ubuntu-latest
          TESTCONTAINERS_RYUK_DISABLED: false
      
      - name: Generate JaCoCo report
        working-directory: backend
        if: always()
        run: ./gradlew jacocoRootReport --no-daemon || echo "JaCoCo report generation skipped"
      
      - name: Check coverage threshold
        working-directory: backend
        if: success()
        run: ./gradlew jacocoTestCoverageVerification --no-daemon || echo "Coverage threshold check - review required"
      
      - name: Upload JUnit test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-test-results
          path: |
            backend/**/build/test-results/**/*.xml
          if-no-files-found: warn
          retention-days: 30
      
      - name: Upload test reports (HTML)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports-html
          path: |
            backend/**/build/reports/tests/**/*
          if-no-files-found: warn
          retention-days: 14
      
      - name: Upload JaCoCo coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-coverage-reports
          path: |
            backend/**/build/reports/jacoco/**/*
            backend/build/reports/jacoco/**/*
          if-no-files-found: warn
          retention-days: 30
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./backend/build/reports/jacoco/jacocoRootReport/jacocoRootReport.xml
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false
      
      - name: Publish test report
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: 'backend/**/build/test-results/**/*.xml'
          check_name: 'Backend Tests'
